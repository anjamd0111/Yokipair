    <script>
        // ====== API URL ======
        const API_BASE = window.location.origin + '/pair';

        // ====== Generate Pair Code ======
        async function generatePairCode() {
            const countrySelect = document.getElementById('countrySelect');
            const phoneInput = document.getElementById('phoneInput');
            const pairBtn = document.getElementById('pairBtn');
            const errorCard = document.getElementById('errorCard');
            const resultCard = document.getElementById('resultCard');
            const codeDisplay = document.getElementById('codeDisplay');

            let countryCode = countrySelect.value.trim();
            let phone = phoneInput.value.trim();

            // Validate
            if (!phone) {
                showError('❌ Please enter a WhatsApp phone number');
                return;
            }

            phone = phone.replace(/[\s\-\+\(\)]/g, '');
            phone = phone.replace(/^0+/, '');

            if (phone.length < 4) {
                showError('❌ Phone number too short');
                return;
            }

            const fullNumber = countryCode + phone;

            // Show loading
            pairBtn.disabled = true;
            document.querySelector('.btn-text').textContent = '⏳ Connecting...';

            try {
                const response = await fetch(`${API_BASE}/${fullNumber}`);
                const data = await response.json();

                if (data.success && data.code) {
                    codeDisplay.textContent = data.code;
                    resultCard.classList.add('show');
                    resultCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    showError(data.error || '❌ Failed to get code');
                }
            } catch (error) {
                showError('🔌 Server offline. Please try again.');
                console.error('Error:', error);
            } finally {
                pairBtn.disabled = false;
                document.querySelector('.btn-text').textContent = '⚡ GET PAIRING CODE';
            }
        }

        // ====== Show Error ======
        function showError(msg) {
            const errorCard = document.getElementById('errorCard');
            errorCard.textContent = msg;
            errorCard.style.display = 'block';
            setTimeout(() => { errorCard.style.display = 'none'; }, 5000);
        }

        // ====== Copy Code ======
        function copyCode() {
            const code = document.getElementById('codeDisplay').textContent;
            const msg = document.getElementById('copiedMsg');
            if (!code || code === '--------') return;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(() => {
                    msg.style.display = 'block';
                    setTimeout(() => { msg.style.display = 'none'; }, 2000);
                });
            } else {
                const ta = document.createElement('textarea');
                ta.value = code;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                msg.style.display = 'block';
                setTimeout(() => { msg.style.display = 'none'; }, 2000);
            }
        }

        // ====== Enter key ======
        document.getElementById('phoneInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') generatePairCode();
        });

        // ====== Init ======
        window.addEventListener('load', () => {
            document.getElementById('phoneInput').focus();
        });
    </script>

</body>
</html>
