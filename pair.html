<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Multi-Device Pairing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #25D366;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            width: 350px;
            height: 350px;
            background: #128C7E;
            bottom: -100px;
            right: -100px;
            animation-delay: -7s;
        }

        .orb:nth-child(3) {
            width: 250px;
            height: 250px;
            background: #075E54;
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(100px, 50px) scale(1.1) rotate(90deg); }
            50% { transform: translate(50px, -30px) scale(0.9) rotate(180deg); }
            75% { transform: translate(-80px, 80px) scale(1.05) rotate(270deg); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            animation: pulse 2s infinite ease-in-out;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5); }
        }

        .logo-section h1 {
            color: #fff;
            font-size: 26px;
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo-section p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Input Group */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #aaa;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .country-code {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #25D366;
            font-weight: 700;
            font-size: 16px;
            z-index: 2;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #25D366;
            box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-wrapper input::placeholder {
            color: #555;
        }

        /* Button */
        .btn-pair {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-pair:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
        }

        .btn-pair:active {
            transform: scale(0.97);
        }

        .btn-pair:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-pair .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-pair.loading .spinner {
            display: inline-block;
        }

        .btn-pair.loading .btn-text {
            display: inline;
        }

        /* Result Card */
        .result-card {
            margin-top: 25px;
            padding: 25px;
            background: rgba(37, 211, 102, 0.08);
            border: 1px solid rgba(37, 211, 102, 0.3);
            border-radius: 16px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .result-card.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-card .code-display {
            text-align: center;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #25D366;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            animation: codePop 0.5s ease-out;
        }

        @keyframes codePop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-card .instruction {
            color: #aaa;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            line-height: 1.6;
        }

        .result-card .instruction a {
            color: #25D366;
            text-decoration: none;
            font-weight: 600;
        }

        .copy-btn {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .copied-msg {
            display: none;
            color: #25D366;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }

        /* Error */
        .error-card {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 12px;
            color: #ff3b30;
            text-align: center;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #444;
            font-size: 12px;
        }

        .footer span {
            color: #25D366;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .card { padding: 25px 20px; }
            .logo-section h1 { font-size: 22px; }
            .code-display { font-size: 32px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="card">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo-icon">💬</div>
                <h1>WhatsApp Pairing</h1>
                <p>Multi-Device Beta • Secure Link</p>
            </div>

            <!-- Input -->
            <div class="input-group">
                <label>Phone Number</label>
                <div class="input-wrapper">
                    <span class="country-code">+91</span>
                    <input 
                        type="tel" 
                        id="phoneInput" 
                        placeholder="Enter WhatsApp number"
                        maxlength="10"
                        autocomplete="off"
                    >
                </div>
            </div>

            <!-- Button -->
            <button class="btn-pair" id="pairBtn" onclick="generatePairCode()">
                <span class="spinner"></span>
                <span class="btn-text">⚡ Get Pairing Code</span>
            </button>

            <!-- Error Card -->
            <div class="error-card" id="errorCard"></div>

            <!-- Result Card -->
            <div class="result-card" id="resultCard">
                <div class="code-display" id="codeDisplay">------</div>
                <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
                <p class="copied-msg" id="copiedMsg">Copied! ✅</p>
                <p class="instruction">
                    Open WhatsApp → <strong>Linked Devices</strong> → <strong>Link a Device</strong><br>
                    Enter this 8-digit code manually.<br>
                    <small>Or visit: <a href="https://web.whatsapp.com" target="_blank">web.whatsapp.com</a></small>
                </p>
            </div>
        </div>

        <div class="footer">
            Built with 🥀 by <span>NONE SUGAR DADDY</span> for <span>@nrtecno2</span>
        </div>
    </div>

    <script>
        // API Base URL — your Railway endpoint
        const API_BASE = 'https://whatbot-telegram-insta-production.up.railway.app';

        async function generatePairCode() {
            const phoneInput = document.getElementById('phoneInput');
            const pairBtn = document.getElementById('pairBtn');
            const errorCard = document.getElementById('errorCard');
            const resultCard = document.getElementById('resultCard');
            const codeDisplay = document.getElementById('codeDisplay');

            let phone = phoneInput.value.trim();

            // Validation
            if (!phone) {
                showError('Please enter a phone number');
                shakeElement(phoneInput);
                return;
            }

            // Clean number
            phone = phone.replace(/\D/g, '');
            
            if (phone.length < 10) {
                showError('Enter a valid 10-digit number');
                shakeElement(phoneInput);
                return;
            }

            // Build full number with country code (default +91 India, change as needed)
            const countryCode = '91'; // Change to your country code
            const fullNumber = countryCode + phone;

            // Reset UI
            errorCard.style.display = 'none';
            resultCard.classList.remove('show');
            pairBtn.classList.add('loading');
            pairBtn.disabled = true;
            document.querySelector('.btn-text').textContent = 'Connecting...';

            try {
                // Call the pairing API
                const response = await fetch(`${API_BASE}/pair?number=${fullNumber}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                if (response.ok && data.code) {
                    // Success — show the pairing code
                    codeDisplay.textContent = data.code;
                    resultCard.classList.add('show');
                    
                    // Scroll to result
                    resultCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    // Trigger confetti-like effect (visual celebration)
                    pulseCode();
                } else if (data.status === 'timeout' || data.message?.includes('timeout')) {
                    showError('⏰ Pairing session expired. Please try again.');
                } else if (data.status === 'already_paired' || data.message?.includes('already')) {
                    showError('📱 This number is already paired!');
                } else {
                    showError(data.message || '❌ Failed to generate code. Try again.');
                }
            } catch (err) {
                console.error('API Error:', err);
                showError('🔌 Connection failed. Check API or network.');
            } finally {
                // Reset button
                pairBtn.classList.remove('loading');
                pairBtn.disabled = false;
                document.querySelector('.btn-text').textContent = '⚡ Get Pairing Code';
            }
        }

        function showError(msg) {
            const errorCard = document.getElementById('errorCard');
            errorCard.textContent = msg;
            errorCard.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorCard.style.display = 'none';
            }, 5000);
        }

        function shakeElement(el) {
            el.style.animation = 'none';
            el.offsetHeight; // Trigger reflow
            el.style.animation = 'shake 0.5s ease';
            setTimeout(() => {
                el.style.animation = '';
            }, 500);
        }

        function pulseCode() {
            const codeDisplay = document.getElementById('codeDisplay');
            codeDisplay.style.transform = 'scale(1.08)';
            setTimeout(() => {
                codeDisplay.style.transform = 'scale(1)';
            }, 300);
        }

        function copyCode() {
            const code = document.getElementById('codeDisplay').textContent;
            const copiedMsg = document.getElementById('copiedMsg');
            
            if (code && code !== '------') {
                navigator.clipboard.writeText(code).then(() => {
                    copiedMsg.style.display = 'block';
                    setTimeout(() => {
                        copiedMsg.style.display = 'none';
                    }, 2500);
                }).catch(() => {
                    // Fallback for mobile browsers
                    const textarea = document.createElement('textarea');
                    textarea.value = code;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    copiedMsg.style.display = 'block';
                    setTimeout(() => {
                        copiedMsg.style.display = 'none';
                    }, 2500);
                });
            }
        }

        // Enter key trigger
        document.getElementById('phoneInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                generatePairCode();
            }
        });

        // Auto-focus input on load
        window.addEventListener('load', () => {
            document.getElementById('phoneInput').focus();
        });
    </script>
</body>
</html>
